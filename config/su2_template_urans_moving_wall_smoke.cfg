% SU2 v8 URANS smoke-test configuration for moving-wall rotating-cylinder cases.
%
% Purpose: verify unsteady setup syntax before expensive production runs.
% This is not intended for final force averaging.

SOLVER= RANS
KIND_TURB_MODEL= SST
MATH_PROBLEM= DIRECT
RESTART_SOL= NO

TIME_DOMAIN= YES
TIME_MARCHING= DUAL_TIME_STEPPING-2ND_ORDER
TIME_STEP= 4.18879020479E-05
TIME_ITER= 20
INNER_ITER= 30

MESH_FILENAME= {mesh_filename}
MESH_FORMAT= SU2
MESH_OUT_FILENAME= mesh_out.su2

MACH_NUMBER= {mach_number}
AOA= {angle_of_attack_deg}
SIDESLIP_ANGLE= 0.0
FREESTREAM_PRESSURE= 101325.0
FREESTREAM_TEMPERATURE= 288.15
FREESTREAM_DENSITY= {density_kg_m3}
FREESTREAM_VISCOSITY= {viscosity_kg_ms}
REYNOLDS_NUMBER= {reynolds_number}
REYNOLDS_LENGTH= {chord_m}

REF_ORIGIN_MOMENT_X= 0.15
REF_ORIGIN_MOMENT_Y= 0.60
REF_ORIGIN_MOMENT_Z= 0.00
REF_LENGTH= {chord_m}
REF_AREA= {reference_area_m2}

MARKER_HEATFLUX= ( {adiabatic_wall_markers} )
MARKER_MOVING= ( {moving_markers} )
SURFACE_MOVEMENT= ( {surface_movements} )
SURFACE_MOTION_ORIGIN= ( {surface_motion_origins} )
SURFACE_TRANSLATION_RATE= ( {surface_translation_rates} )
SURFACE_ROTATION_RATE= ( {surface_rotation_rates} )

MARKER_FAR= ( inlet, outlet, farfield, side_ymin, side_ymax )
MARKER_PLOTTING= ( {solid_wall_markers} )
MARKER_MONITORING= ( {solid_wall_markers} )

NUM_METHOD_GRAD= WEIGHTED_LEAST_SQUARES
CFL_NUMBER= 0.2
CFL_ADAPT= NO
TIME_DISCRE_FLOW= EULER_IMPLICIT

CONV_NUM_METHOD_FLOW= JST
JST_SENSOR_COEFF= ( 0.8, 0.05 )
LINEAR_SOLVER= FGMRES
LINEAR_SOLVER_PREC= LU_SGS
LINEAR_SOLVER_ERROR= 1E-7
LINEAR_SOLVER_ITER= 30

CONV_FIELD= RMS_DENSITY
CONV_RESIDUAL_MINVAL= -6
CONV_STARTITER= 10

SCREEN_OUTPUT= ( TIME_ITER, INNER_ITER, RMS_DENSITY, RMS_ENERGY, LIFT, DRAG )
HISTORY_OUTPUT= ( ITER, RMS_RES, AERO_COEFF, AERO_COEFF_SURF )
VOLUME_OUTPUT= ( COORDINATES, SOLUTION, PRIMITIVE )
OUTPUT_FILES= ( RESTART )

OUTPUT_WRT_FREQ= 10
HISTORY_WRT_FREQ_INNER= 1
CONV_FILENAME= history
RESTART_FILENAME= restart
SOLUTION_FILENAME= solution
VOLUME_FILENAME= flow
SURFACE_FILENAME= surface_flow
