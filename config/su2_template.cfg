% SU2 v8 pipeline check configuration for the 3D finite wing cases.
%
% This template is intentionally Euler-only. Use it to validate mesh markers,
% case setup, and solver I/O before moving to viscous/turbulent wall modeling.

SOLVER= EULER
KIND_TURB_MODEL= NONE
MATH_PROBLEM= DIRECT
RESTART_SOL= NO

MESH_FILENAME= {mesh_filename}
MESH_FORMAT= SU2
MESH_OUT_FILENAME= mesh_out.su2

MACH_NUMBER= {mach_number}
AOA= {angle_of_attack_deg}
SIDESLIP_ANGLE= 0.0
FREESTREAM_PRESSURE= 101325.0
FREESTREAM_TEMPERATURE= 288.15
FREESTREAM_DENSITY= {density_kg_m3}
FREESTREAM_VISCOSITY= {viscosity_kg_ms}

REF_ORIGIN_MOMENT_X= 0.15
REF_ORIGIN_MOMENT_Y= 0.60
REF_ORIGIN_MOMENT_Z= 0.00
REF_LENGTH= {chord_m}
REF_AREA= {reference_area_m2}

MARKER_EULER= ( wing{cylinder_marker} )
MARKER_FAR= ( inlet, outlet, farfield, side_ymin, side_ymax, ground )
MARKER_PLOTTING= ( wing{cylinder_marker} )
MARKER_MONITORING= ( wing{cylinder_marker} )

NUM_METHOD_GRAD= WEIGHTED_LEAST_SQUARES
CFL_NUMBER= 5.0
CFL_ADAPT= NO
TIME_DISCRE_FLOW= EULER_IMPLICIT

CONV_NUM_METHOD_FLOW= JST
JST_SENSOR_COEFF= ( 0.5, 0.02 )
LINEAR_SOLVER= FGMRES
LINEAR_SOLVER_PREC= LU_SGS
LINEAR_SOLVER_ERROR= 1E-6
LINEAR_SOLVER_ITER= 10

ITER= 200
CONV_FIELD= RMS_DENSITY
CONV_RESIDUAL_MINVAL= -8
CONV_STARTITER= 10

SCREEN_OUTPUT= ( INNER_ITER, RMS_DENSITY, RMS_ENERGY, LIFT, DRAG )
HISTORY_OUTPUT= ( ITER, RMS_RES, AERO_COEFF )
VOLUME_OUTPUT= ( COORDINATES, SOLUTION, PRIMITIVE )
OUTPUT_FILES= ( RESTART, PARAVIEW, SURFACE_PARAVIEW )

OUTPUT_WRT_FREQ= 100
HISTORY_WRT_FREQ_INNER= 1
CONV_FILENAME= history
RESTART_FILENAME= restart
SOLUTION_FILENAME= solution
VOLUME_FILENAME= flow
SURFACE_FILENAME= surface_flow
